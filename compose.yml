version: "3.8"

services:
  warp:
    build: ./warp
    image: localhost/ultimate-media-manager-warp:latest
    container_name: ultimate-media-manager-warp
    restart: always
    networks:
      - dev-infra
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "-x", "socks5h://127.0.0.1:1080", "https://www.cloudflare.com/cdn-cgi/trace" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s

  app:
    build:
      context: .
      dockerfile: Containerfile
    image: localhost/ultimate-media-manager:latest
    container_name: ultimate-media-manager-app
    restart: always
    env_file: .env
    environment:
      WARP_PROXY: socks5://warp:1080
    depends_on:
      warp:
        condition: service_healthy
    networks:
      - dev-infra
    healthcheck:
      test: [ "CMD", "deno", "eval", "const response = await fetch('http://127.0.0.1:3000').catch(() => null); Deno.exit(response?.ok ? 0 : 1)" ]
      interval: 1s
      timeout: 2s
      retries: 5
      start_period: 3s

networks:
  dev-infra:
    name: dev-infra
    external: true
