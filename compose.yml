version: "3.8"

services:
  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    container_name: ultimate-media-manager-cobalt
    restart: always
    read_only: true
    environment:
      API_URL: http://cobalt:9000/
    networks:
      - dev-infra
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:9000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: ultimate-media-manager-searxng
    restart: always
    env_file: .env
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    volumes:
      - ./configs/searxng-settings.yml:/etc/searxng/settings.yml:Z
      - searxng-data:/var/cache/searxng
    networks:
      - dev-infra
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).status < 500 else 1)\" || python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5).status < 500 else 1)\"" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    image: localhost/ultimate-media-manager:latest
    container_name: ultimate-media-manager-app
    restart: always
    env_file: .env
    environment:
      COBALT_API_URL: http://cobalt:9000
      SEARXNG_API_URL: http://searxng:8080
    depends_on:
      cobalt:
        condition: service_healthy
      searxng:
        condition: service_healthy
    networks:
      - dev-infra
    healthcheck:
      test: [ "CMD", "node", "-e", "process.kill(1, 0)" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  searxng-data:
    name: ultimate-media-manager-searxng-data

networks:
  dev-infra:
    name: dev-infra
    external: true
