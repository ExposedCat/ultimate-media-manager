version: "3.8"

services:
  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    container_name: ultimate-media-manager-cobalt-dev
    restart: unless-stopped
    read_only: true
    profiles:
      - local-cobalt
    environment:
      API_URL: http://127.0.0.1:9000/
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:9000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Containerfile
    image: localhost/ultimate-media-manager:latest
    container_name: ultimate-media-manager-app
    restart: always
    env_file: .env
    networks:
      - dev-infra
    healthcheck:
      test: [ "CMD", "deno", "eval", "const response = await fetch('http://127.0.0.1:3000').catch(() => null); Deno.exit(response?.ok ? 0 : 1)" ]
      interval: 1s
      timeout: 2s
      retries: 5
      start_period: 3s

networks:
  dev-infra:
    name: dev-infra
    external: true
