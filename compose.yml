version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    image: localhost/ultimate-media-manager:latest
    container_name: ultimate-media-manager-app
    restart: always
    env_file: .env
    networks:
      - dev-infra
    healthcheck:
      test: [ "CMD", "deno", "eval", "const response = await fetch('http://127.0.0.1:3000').catch(() => null); Deno.exit(response?.ok ? 0 : 1)" ]
      interval: 1s
      timeout: 2s
      retries: 5
      start_period: 3s

networks:
  dev-infra:
    name: dev-infra
    external: true
